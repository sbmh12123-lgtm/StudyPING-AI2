<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      display: flex;
      height: 100vh;
      background: #fff;
    }

    /* Sidebar */
    #sidebar {
      width: 240px;
      border-right: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 8px;
      overflow-y: auto;
    }

    #new-chat-btn {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      background: #fff;
    }

    #new-chat-btn:hover { background: #f5f5f5; }

    .convo-item {
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #444;
    }

    .convo-item:hover { background: #f5f5f5; }
    .convo-item.active { background: #f0f0f0; color: #000; }

    /* Main */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 75%;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg.ai { align-self: flex-start; }

    .bubble {
      font-size: 14px;
      line-height: 1.6;
      padding: 10px 14px;
      border-radius: 16px;
    }

    .msg.user .bubble {
      background: #e8e8e8;
      border-radius: 18px 18px 4px 18px;
    }

    .msg.ai .bubble {
      background: #f5f5f5;
      border-radius: 18px 18px 18px 4px;
    }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #aaa;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.3;} 40%{opacity:1;} }

    /* Input */
    #input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid #e5e5e5;
    }

    #input-box {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 10px 12px;
    }

    #msg-input {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      min-height: 24px;
      max-height: 120px;
      background: transparent;
    }

    #send-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: #000;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #send-btn:hover { opacity: 0.8; }
  </style>
</head>
<body>

  <div id="sidebar">
    <button id="new-chat-btn" onclick="newChat()">+ New chat</button>
    <div id="convo-list"></div>
  </div>

  <div id="main">
    <div id="messages"></div>
    <div id="input-area">
      <div id="input-box">
        <textarea
          id="msg-input"
          rows="1"
          placeholder="Message..."
          oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px'"
          onkeydown="handleKey(event)"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:8000';

    let conversations = [];
    let activeId = null;

    function newChat() {
      const id = Date.now();
      const convo = { id, title: 'New chat', messages: [] };
      conversations.unshift(convo);
      activeId = id;
      renderSidebar();
      renderMessages();
    }

    function switchChat(id) {
      activeId = id;
      renderSidebar();
      renderMessages();
    }

    function getActive() {
      return conversations.find(c => c.id === activeId);
    }

    function renderSidebar() {
      const list = document.getElementById('convo-list');
      list.innerHTML = conversations.map(c => `
        <div class="convo-item ${c.id === activeId ? 'active' : ''}" onclick="switchChat(${c.id})">
          ${c.title}
        </div>
      `).join('');
    }

    function renderMessages() {
      const convo = getActive();
      const container = document.getElementById('messages');
      if (!convo) { container.innerHTML = ''; return; }

      container.innerHTML = convo.messages.map(m => {
        if (m.role == "user"){
          message = m.content;
        } 
        else{
          message = m.content;
        }
        return `
        <div class="msg ${m.role}">
          <div class="bubble">${message}</div>
        </div>
      `}).join('');

      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;
      if (!activeId) newChat();

      const convo = getActive();

      // Add user message
      convo.messages.push({ role: 'user', content: text });
      if (convo.title === 'New chat') convo.title = text.slice(0, 30);
      input.value = '';
      input.style.height = 'auto';
      renderSidebar();
      renderMessages();

      // Show typing indicator
      showTyping();

      try {
        const response = await fetch(`/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: convo.messages[convo.messages.length - 1].content })
        });

        const data = await response.json();
        console.log("Received response from server:", data);
        const reply = data.response || data.message || data.content || 'No response';

        removeTyping();
        convo.messages.push({ role: 'ai', content: reply });
        renderMessages();
      } catch (err) {
        removeTyping();
        convo.messages.push({ role: 'ai', content: 'Error: could not reach the server.' });
        renderMessages();
      }
    }

    function showTyping() {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ai';
      div.id = 'typing-indicator';
      div.innerHTML = `
        <div class="bubble">
          <div class="typing">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    // Start with one empty chat
    newChat();
  </script>

</body>
</html>
